<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridgeward</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pine:#143A2E;--pine-2:#1d4d3a;--pine-line:#24533f;
  --paper:#f5f5f2;--paper-2:#e9e8e1;--card:#ffffff;
  --ink:#1b241e;--slate:#69756b;--slate-2:#9aa49a;
  --timber:#C68A5A;--amber:#C68A5A;--amber-deep:#b3774c;
  --rust:#a8432a;--rust-soft:#ecd8cd;--green-ok:#2f6b47;--green-ok-soft:#dbe7dd;
  --amber-soft:#f1ddca;--blue:#4f7d72;--violet:#9a7558;
  --shadow:0 1px 0 rgba(20,58,46,.03),0 2px 8px rgba(20,58,46,.05);
  --shadow-lift:0 10px 34px rgba(20,58,46,.16);--r:10px;
  --font-display:'Inter Tight',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-narrow:'Inter Tight',system-ui,sans-serif;
  --font-mono:'Space Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
h1,h2,h3,h4,.stat .num,.brand h1{font-family:var(--font-display);letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
.eyebrow{font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.18em;font-size:10.5px;font-weight:700;color:var(--slate)}
.app{display:flex;min-height:100vh}
.menuBtn{display:none;background:none;border:0;cursor:pointer;color:var(--ink);padding:6px;margin:0 6px 2px -4px;border-radius:8px}
.menuBtn:hover{background:var(--paper-2)}
.navback{display:none}
@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;z-index:60;height:100%;width:266px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 50px rgba(20,28,22,.4)}
  body.navopen .sidebar{transform:none}
  .navback{position:fixed;inset:0;background:rgba(20,28,22,.45);z-index:55}
  body.navopen .navback{display:block}
  .menuBtn{display:inline-flex;align-items:center}
  .topbar{padding:12px 16px;align-items:center}
  .topbar .ttl h2{font-size:20px}
  .content{padding:16px 14px 90px}
  .stats{grid-template-columns:repeat(2,1fr)!important}
  .section-h{flex-wrap:wrap;gap:8px}
  .filters{gap:6px}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
@media(max-width:520px){
  .stats{grid-template-columns:1fr 1fr!important}
  .topbar .acts{display:none}
}
.sidebar{width:248px;background:var(--pine);color:#e9e4d4;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--pine-line)}
.brand{padding:22px 22px 16px}
.brand .mark{display:flex;align-items:center;gap:10px}
.brand .glyph{width:36px;height:36px;background:none;box-shadow:none;display:block}
.brand .glyph svg{width:100%;height:100%;display:block}
.brand h1{font-size:15px;font-weight:800;margin:0;letter-spacing:-.01em;color:#fff;line-height:1.1}
.brand .sub{font-size:10.5px;color:#a6b6a4;letter-spacing:.16em;text-transform:uppercase;margin-top:3px;font-family:var(--font-narrow);font-weight:600}
.nav{padding:6px 12px;flex:1;overflow:auto}
.nav .seclbl{padding:14px 12px 6px;color:#7e9180;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-narrow);font-weight:700}
.nav button{width:100%;text-align:left;border:0;background:transparent;color:#d6d0bf;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:1px}
.nav button .ic{width:18px;display:inline-grid;place-items:center;opacity:.85}
.nav button:hover{background:var(--pine-2);color:#fff}
.nav button.active{background:var(--amber);color:var(--pine);font-weight:700}
.nav .count{margin-left:auto;font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.1);padding:1px 7px;border-radius:20px;color:#cdbf9f}
.nav button.active .count{background:rgba(28,51,39,.18);color:var(--pine)}
.sidebar .foot{padding:12px 22px;border-top:1px solid var(--pine-line);font-size:10.5px;color:#8fa08d;font-family:var(--font-narrow)}
.sidebar .foot b{color:#cdbf9f;font-weight:700}
.sidebar .foot button{margin-top:6px;background:transparent;border:1px solid var(--pine-line);color:#a6b6a4;padding:4px 8px;border-radius:6px;font-size:10.5px;font-family:var(--font-narrow);font-weight:700}
.sidebar .foot button:hover{color:#fff;border-color:#7e9180}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--paper);border-bottom:1px solid #d9d3c2;padding:18px 30px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:30}
.topbar .ttl h2{margin:0;font-size:23px;font-weight:800;letter-spacing:-.02em}
.topbar .ttl p{margin:3px 0 0;color:var(--slate);font-size:13px;max-width:64ch}
.topbar .acts{display:flex;gap:8px;flex-shrink:0}
.content{padding:24px 30px 70px;max-width:1180px;width:100%}
.btn{border:1px solid #cdc6b3;background:var(--card);color:var(--ink);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:transform .04s,box-shadow .12s}
.btn:hover{box-shadow:var(--shadow)}.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--pine);border-color:#0e2c22;color:#fff}.btn.primary:hover{background:var(--pine-2)}
.btn.cta{background:var(--amber);border-color:var(--amber-deep);color:#fff}.btn.cta:hover{background:var(--amber-deep)}
.btn.dark{background:var(--pine);border-color:var(--pine);color:#f1ecdb}.btn.dark:hover{background:var(--pine-2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--slate)}.btn.ghost:hover{background:var(--paper-2);color:var(--ink)}
.btn.sm{padding:5px 10px;font-size:12px}.btn.tiny{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid #e2dcca;border-radius:var(--r);box-shadow:var(--shadow)}.card.pad{padding:18px}
.stat{padding:16px 18px;position:relative;overflow:hidden}
.stat .lbl{font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;color:var(--slate);font-weight:700}
.stat .num{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-top:6px;line-height:1}
.stat .meta{font-size:12px;color:var(--slate);margin-top:6px}
.stat .edge{position:absolute;left:0;top:0;bottom:0;width:4px}
.stat.overdue .num{color:var(--rust)}.stat.overdue .edge{background:var(--rust)}
.stat.soon .edge{background:var(--amber)}.stat.ok .edge{background:var(--green-ok)}.stat.cost .edge{background:var(--pine)}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px}
.section-h h3{margin:0;font-size:16px;font-weight:800}.section-h .eyebrow{margin-bottom:2px}
.plate{font-family:var(--font-mono);font-size:11px;font-weight:700;background:var(--pine);color:var(--amber);padding:2px 7px;border-radius:4px;letter-spacing:.04em;display:inline-block;border:1px solid #000;white-space:nowrap}
.plate.lg{font-size:13px;padding:4px 10px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.cat-Forestry{background:#2f6b3c}.cat-Crop{background:#7fae3b}.cat-Buildings{background:#9a6a3a}.cat-Recreational{background:#7b5ea7}.cat-Water{background:#2f7fae}.cat-Tracks{background:#b8884e}.cat-Equipment{background:#c2641e}.cat-default{background:var(--slate)}
.tag{font-family:var(--font-narrow);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;padding:2px 8px;border-radius:5px;display:inline-block;white-space:nowrap}
.tag.overdue{background:var(--rust);color:#fff}.tag.soon{background:var(--amber-soft);color:var(--amber-deep)}.tag.later{background:var(--paper-2);color:var(--slate)}
.tag.done{background:var(--green-ok-soft);color:var(--green-ok)}.tag.trigger{background:#e7ddef;color:var(--violet)}.tag.usage{background:#dfeaf2;color:var(--blue)}
.tag.sched{background:var(--pine);color:#cfe0c9}.tag.skip{background:#e6e1d4;color:#8a8268}
.tag.src-OEM{background:#22303a;color:#bcd6e6}.tag.src-Best{background:var(--pine);color:#cfe0c9}.tag.src-User{background:var(--timber);color:#3a2812}.tag.src-Custom{background:var(--timber);color:#3a2812}
.pri{font-family:var(--font-narrow);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.pri.Critical{color:var(--rust)}.pri.High{color:var(--amber-deep)}.pri.Medium{color:var(--slate)}.pri.Low{color:var(--slate-2)}
.tablewrap{overflow:auto;border:1px solid #e2dcca;border-radius:var(--r);background:var(--card);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--paper-2);text-align:left;padding:10px 14px;font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;color:var(--slate);font-weight:700;border-bottom:1px solid #d9d3c2;position:sticky;top:0}
tbody td{padding:10px 14px;border-bottom:1px solid #efeada;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}tbody tr:hover{background:#fdfcf6}
.t-name{font-weight:700}.t-sub{color:var(--slate);font-size:12px}
.num-cell{font-family:var(--font-mono);font-size:12px;text-align:right}.due-cell{font-family:var(--font-mono);font-size:12px;white-space:nowrap}
select,input,textarea{font-family:var(--font-display);font-size:13px;color:var(--ink);border:1px solid #cdc6b3;border-radius:7px;padding:6px 9px;background:var(--card)}
select:focus,input:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:-1px;border-color:var(--amber)}
.assignsel{font-size:12px;max-width:165px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.filters .fl{display:flex;flex-direction:column;gap:3px}.filters .fl .eyebrow{margin:0}
.searchbox{flex:1;min-width:150px}
.detail-grid{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
.kv{display:grid;grid-template-columns:118px 1fr;gap:6px 12px;font-size:13px}
.kv dt{color:var(--slate);font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;font-weight:700;padding-top:2px}
.kv dd{margin:0;font-weight:600}
.cond{display:inline-flex;gap:3px}.cond i{width:8px;height:14px;border-radius:2px;background:#ddd6c3;display:inline-block}.cond i.on{background:var(--green-ok)}
.cal{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.cal .mo{background:var(--card);border:1px solid #e2dcca;border-radius:var(--r);padding:12px;min-height:120px;box-shadow:var(--shadow)}
.cal .mo h6{margin:0 0 8px;font-size:12px;font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.1em;color:var(--pine);display:flex;justify-content:space-between}
.cal .mo .load{font-family:var(--font-mono);font-size:10.5px;color:var(--slate);font-weight:700}
.cal .mo ul{margin:0;padding:0;list-style:none;font-size:11.5px}
.cal .mo li{padding:3px 0;display:flex;gap:6px;align-items:baseline;border-top:1px solid #f0ebda}
.cal .mo li .pd{font-family:var(--font-mono);font-size:9.5px;color:var(--slate)}
.cal .mo li.sc .pd{color:var(--green-ok)}
.bar{height:5px;border-radius:3px;background:var(--paper-2);overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:var(--amber)}
.modal-bg{position:fixed;inset:0;background:rgba(24,28,23,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:14px;max-width:600px;width:100%;box-shadow:var(--shadow-lift);overflow:hidden}
.modal.wide{max-width:680px}
.modal header{padding:16px 22px;border-bottom:1px solid #e2dcca;display:flex;justify-content:space-between;align-items:center;background:var(--paper)}
.modal header h3{margin:0;font-size:16px}
.modal .body{padding:18px 22px;display:grid;gap:13px;max-height:66vh;overflow:auto}
.modal .body label{display:grid;gap:4px}.modal .body .eyebrow{margin:0}
.modal footer{padding:13px 22px;border-top:1px solid #e2dcca;display:flex;justify-content:space-between;gap:8px;background:var(--paper);align-items:center}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.empty{text-align:center;padding:44px 20px;color:var(--slate)}.empty .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pine);color:#f1ecdb;padding:11px 18px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:var(--shadow-lift);opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12px;color:var(--slate);background:var(--amber-soft);border-left:3px solid var(--amber);padding:9px 12px;border-radius:0 8px 8px 0}
.note.blue{background:#e0edf3;border-color:var(--blue)}
.linkish{color:var(--amber-deep);font-weight:700;cursor:pointer}.linkish:hover{text-decoration:underline}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--slate)}
.taskpick{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-top:1px solid #f0ebda}
.taskpick input[type=checkbox]{margin-top:3px;width:15px;height:15px;accent-color:var(--pine)}
.taskpick .tp-main{flex:1}.taskpick .tp-meta{font-size:11px;color:var(--slate);font-family:var(--font-mono)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.digest-out{background:var(--card);border:1px solid #e2dcca;border-radius:var(--r);padding:24px 26px;box-shadow:var(--shadow)}
.digest-out h4{margin:0 0 2px;font-size:18px}
.digest-grp{margin-top:16px}
.digest-grp h5{margin:0 0 8px;font-size:13px;font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.12em;color:var(--pine);border-bottom:2px solid var(--paper-2);padding-bottom:5px}
.digest-item{display:flex;gap:10px;padding:6px 0;font-size:13px;border-bottom:1px dotted #e7e1cf;align-items:baseline}
.digest-item .d{font-family:var(--font-mono);font-size:12px;min-width:96px;font-weight:700;color:var(--slate)}
.digest-item .d.od{color:var(--rust)}
.iu{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.iu select{padding:2px 4px;font-size:10.5px;border-radius:5px}
.pchip{font-family:var(--font-narrow);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:5px;white-space:nowrap}
.pchip.p1{background:var(--rust);color:#fff}.pchip.p2{background:var(--amber-soft);color:var(--amber-deep)}.pchip.p3{background:#dfeaf2;color:var(--blue)}.pchip.p4{background:var(--paper-2);color:var(--slate)}
.tag.reactive{background:#7a1f12;color:#ffd9cc}
.tag.improve{background:#1d5b56;color:#bfeae4}
.tag.hold{background:#5b4a1d;color:#f0e3bf}
.matrix{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
.qcell{border:1px solid #e2dcca;border-radius:12px;padding:14px;min-height:150px;background:var(--card);box-shadow:var(--shadow)}
.qcell h4{margin:0 0 2px;font-size:14px;display:flex;align-items:center;gap:8px}
.qcell .qn{font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.1em;font-size:10px;color:var(--slate);font-weight:700}
.qcell.q1{border-top:4px solid var(--rust)}.qcell.q2{border-top:4px solid var(--amber)}.qcell.q3{border-top:4px solid var(--blue)}.qcell.q4{border-top:4px solid var(--slate-2)}
.qjob{display:flex;gap:8px;align-items:baseline;padding:6px 0;border-top:1px solid #f0ebda;font-size:12.5px;cursor:pointer}
.qjob:hover{color:var(--amber-deep)}.qjob .qp{font-family:var(--font-mono);font-size:10px;color:var(--slate);min-width:62px}
.axislbl{font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--slate);font-weight:700;text-align:center;padding:4px}
.ro-banner{background:var(--pine);color:#f1ecdb;padding:8px 30px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px}
.ro-banner .tag{background:var(--amber);color:var(--pine)}
body.ro .editonly{display:none!important}
.dataline{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #efeada;font-size:13px}
.dataline:last-child{border-bottom:0}
.savetag{font-size:10.5px;font-family:var(--font-narrow);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green-ok)}
.varbar{height:8px;border-radius:4px;background:var(--paper-2);overflow:hidden;display:flex}
.varbar i{display:block;height:100%}
.over{color:var(--rust);font-weight:700}.under{color:var(--green-ok);font-weight:700}
.esc{background:var(--rust);color:#fff;font-family:var(--font-narrow);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:5px}
.complist .ci{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid #efeada}
.complist .ci:last-child{border-bottom:0}
.field-card{background:var(--card);border:1px solid #e2dcca;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.field-card .fh{font-size:16px;font-weight:800}
.field-card .fm{font-size:13px;color:var(--slate);margin:3px 0 10px}
.field-card .fbtns{display:flex;gap:8px}
.field-card .fbtns .btn{flex:1;justify-content:center;padding:12px;font-size:15px}
.field-wrap{max-width:560px;margin:0 auto}
.asset-grp{margin-bottom:12px;overflow:hidden;padding:0}
.asset-grp .agh{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid #ece6d6;background:var(--paper-2);flex-wrap:wrap}
.asset-grp .tablewrap{border:0;box-shadow:none;border-radius:0;margin:0}
.asset-grp table{margin:0}
.statusSel{font-family:var(--font-narrow);font-size:11px;font-weight:600;padding:3px 6px;border-radius:6px;border:1px solid #d8d1bf;background:#fff}
.schedDate{font-family:var(--font-body);font-size:11.5px;padding:3px 6px;border:1px solid #d8d1bf;border-radius:6px;background:#fff;color:var(--ink);max-width:140px}
.schedDate:focus{outline:2px solid var(--amber);border-color:var(--amber)}
.tag.prog{background:#e7efe9;color:var(--pine)}
@media(max-width:680px){
  .asset-grp table thead{display:none}
  .asset-grp table,.asset-grp tbody,.asset-grp tr,.asset-grp td{display:block;width:100%}
  .asset-grp tr{border:1px solid var(--line2);border-radius:11px;margin:10px;padding:4px 2px;background:#fff}
  .asset-grp td{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:8px 13px;border:0;text-align:right}
  .asset-grp td::before{content:attr(data-th);font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.06em;font-size:10px;color:var(--slate-2);font-weight:700;text-align:left;flex-shrink:0}
  .asset-grp td:first-child{border-bottom:1px solid var(--paper-2);padding-bottom:10px}
  .asset-grp td:first-child::before{display:none}
  .asset-grp td .t-name{text-align:left;font-size:14.5px}
  .asset-grp .iu{justify-content:flex-end}
  .asset-grp .schedDate,.asset-grp .statusSel,.asset-grp .assignsel{max-width:none}
}
.meter{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid #efeada}
.meter:last-child{border-bottom:0}
.meter .ml{flex:1;font-weight:600;font-size:13px}
.meter .mv{font-family:var(--font-mono);font-size:13px;font-weight:700}
.meter input{width:120px}
.meter .mk{font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;color:var(--slate);font-weight:700}
.digest-sub{margin:14px 0 6px;font-family:var(--font-narrow);text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--pine);font-weight:700}
.dg-stat{display:inline-flex;flex-direction:column;gap:1px;padding:8px 14px;background:var(--paper-2);border-radius:8px;margin:0 8px 8px 0}
.dg-stat b{font-size:16px}.dg-stat span{font-size:10.5px;color:var(--slate);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-narrow);font-weight:700}
.weekrow{display:flex;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid #efeada}
.weekrow:last-child{border-bottom:0}.weekrow .wd{font-family:var(--font-mono);font-size:11px;color:var(--green-ok);font-weight:700;min-width:74px}
.wx{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.wx .d{background:var(--paper-2);border-radius:8px;padding:8px 6px;text-align:center}
.wx .d.alert{background:#f3d9cc;outline:2px solid var(--rust)}
.wx .d .dn{font-family:var(--font-narrow);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate)}
.wx .d .rain{font-family:var(--font-mono);font-size:13px;font-weight:700;margin-top:3px}
.wx .d .rain.hi{color:var(--rust)}.wx .d .ic{font-size:15px}
.insight{display:flex;gap:12px;align-items:center;background:linear-gradient(90deg,#f3d9cc,#fbeee6);border:1px solid var(--rust);border-radius:10px;padding:12px 14px;margin-top:12px}
.insight .ix{font-size:20px}.insight .it{flex:1;font-size:13px}.insight .it b{color:var(--rust)}
.logentry{padding:11px 0;border-bottom:1px solid #efeada}
.logentry:last-child{border-bottom:0}
.logentry .lh{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.logentry .lmeta{font-family:var(--font-mono);font-size:11px;color:var(--slate)}
.logentry textarea{width:100%;min-height:38px;margin-top:6px;font-size:12.5px;resize:vertical}
.logentry .saved{color:var(--green-ok);font-size:11px;font-weight:700}
.muted-link{color:var(--slate);font-size:11px;cursor:pointer;text-decoration:underline}
@media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.cal{grid-template-columns:repeat(3,1fr)}.detail-grid{grid-template-columns:1fr}.wx{grid-template-columns:repeat(4,1fr)}}
@media(max-width:720px){.sidebar{display:none}.content{padding:18px}.topbar{padding:14px 18px}.cal{grid-template-columns:repeat(2,1fr)}.row2,.row3{grid-template-columns:1fr}}
</style>

    if(this.hasPersist){try{const r=await window.storage.get('station_v2',false);if(r&&r.value){this.state=JSON.parse(r.value);this.migrate();return;}}catch(e){}}
    this.seed();await this.save();
  },
  migrate(){
    const s=this.state;if(!s.history)s.history=[];
    if(!s.config)s.config={lat:-36.8485,lon:174.7633,place:'Auckland, NZ',rain:25};
    if(s.config.budget===undefined)s.config.budget=0;
    const map={Critical:['High','High'],High:['High','Medium'],Medium:['Medium','Medium'],Low:['Low','Low']};
    s.workOrders.forEach(w=>{
      if(!w.importance||!w.urgency){const m=map[w.priority]||['Medium','Medium'];w.importance=w.importance||m[0];w.urgency=w.urgency||m[1];}
      if(!w.kind)w.kind='planned';
      if(w.quote===undefined)w.quote=null;
      if(w.actualCost===undefined)w.actualCost=null;
    });
    s.assets.forEach(a=>{if(!a.meters)a.meters=meterDefaults(a);if(!a.planIds){const pf=planFor(a);a.planIds=pf?[pf.id]:[];}});
    if(!s.people)s.people=[];
    if(!s.people.some(p=>p.name==='Unassigned'))s.people.push({name:'Unassigned',role:''});
    (s.workOrders||[]).forEach(w=>{
      if(w.status==='Planned'||w.status==='Scheduled')w.status='Open';
      else if(w.status==='Skipped')w.status='Complete';
      if(!['Open','In Progress','On hold','Complete'].includes(w.status))w.status='Open';
    });
    let mx=s.seq||0;s.workOrders.forEach(w=>{const n=parseInt((w.id||'').replace(/\D/g,''))||0;if(n>mx)mx=n;});s.seq=mx;
    s.appVersion=APP_VERSION;s.schema=SCHEMA;s.lastMigrated=new Date().toISOString();
  },
  seed(){
    const s=JSON.parse(JSON.stringify(window.__SEED__));
    s.workOrders.forEach(w=>{w.dueDate=w.dueDate?iso(w.dueDate):null;w.scheduledDate=w.scheduledDate?iso(w.scheduledDate):null;});
    this.state=s;this.migrate();
  },
  async save(){
    if(READONLY)return;
    if(SUPA_OK){this._lastSave=Date.now();clearTimeout(this._saveT);
      const t0=document.getElementById('saveState');if(t0)t0.textContent='saving\u2026';
      this._saveT=setTimeout(()=>{Supa.saveState(activeEntity,this.state)
        .then(()=>{this._lastSave=Date.now();const t=document.getElementById('saveState');if(t)t.textContent='\u2713 saved to cloud';})
        .catch(e=>{console.error(e);const t=document.getElementById('saveState');if(t)t.textContent='\u26a0 save failed';toast('Cloud save failed \u2014 check connection');});},800);
      return;}
    if(this.hasPersist){try{await window.storage.set('station_v2',JSON.stringify(this.state),false);}catch(e){}}
    if(this.fileHandle){clearTimeout(this._saveT);this._saveT=setTimeout(()=>this.writeFile(),600);}
    this.autoSnapshot();
    const t=document.getElementById('saveState');if(t){t.textContent=this.fileHandle?'\u2713 saved to file':'\u2713 saved';}
  },
  async reset(){this.seed();await this.save();},
  async writeFile(){try{const w=await this.fileHandle.createWritable();await w.write(JSON.stringify(this.state,null,2));await w.close();}catch(e){toast('Could not write to data file');}},
  loadObj(obj){if(obj&&obj.assets&&obj.workOrders){
      const fromVer=obj.appVersion||'pre-1.0';
      if(fromVer!==APP_VERSION){this.safetyBackup(obj,fromVer);this._upgradedFrom=fromVer;}else{this._upgradedFrom=null;}
      this.state=obj;this.migrate();return true;}return false;},
  safetyBackup(obj,fromVer){
    const name='station-backup-before-update-'+new Date().toISOString().slice(0,10)+'.json';
    const data=JSON.stringify(obj,null,2);
    if(this.backupDir){this.backupDir.getFileHandle(name,{create:true}).then(fh=>fh.createWritable()).then(w=>w.write(data).then(()=>w.close())).catch(()=>this._dlBackup(name,data));}
    else{this._dlBackup(name,data);}
  },
  _dlBackup(name,data){try{const blob=new Blob([data],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}catch(e){}},
  counts(){const s=this.state;return s.assets.length+' assets \u00b7 '+s.workOrders.length+' jobs \u00b7 '+(s.history?s.history.length:0)+' history';},
  backupDir:null,
  async autoSnapshot(){ // one snapshot per calendar day, keep last 7, plus optional folder copy
    const day=new Date().toISOString().slice(0,10);
    if(this._snapDay===day)return; this._snapDay=day;
    if(this.hasPersist){try{
      await window.storage.set('snap:'+day,JSON.stringify({when:Date.now(),state:this.state}),false);
      const r=await window.storage.list('snap:',false);const keys=((r&&r.keys)||[]).sort();
      while(keys.length>7){const k=keys.shift();try{await window.storage.delete(k,false);}catch(e){}}
    }catch(e){}}
    if(this.backupDir){try{const fh=await this.backupDir.getFileHandle('station-'+day+'.json',{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(this.state,null,2));await w.close();}catch(e){}}
  },
  async listSnapshots(){if(!this.hasPersist)return [];try{const r=await window.storage.list('snap:',false);return (((r&&r.keys)||[]).map(k=>k.replace('snap:','')).sort().reverse());}catch(e){return [];}},
  async restoreSnapshot(day){if(!this.hasPersist)return false;try{const r=await window.storage.get('snap:'+day,false);if(r&&r.value){const o=JSON.parse(r.value);if(o.state){this.state=o.state;this.migrate();await this.save();return true;}}}catch(e){}return false;}
};
/* ============================ SUPABASE BACKEND ============================ */
// snake_case (DB) <-> camelCase (app) mapping
function assetToRow(a,e){return {entity_id:e,code:a.code,name:a.name,category:a.category,subcategory:a.subcategory,type:a.type||null,location:a.location||null,ownership:a.ownership||null,make_model:a.makeModel||null,condition:a.condition||null,description:a.description||null,meters:a.meters||[],plan_ids:a.planIds||[]};}
function rowToAsset(r){return {code:r.code,name:r.name,category:r.category,subcategory:r.subcategory,type:r.type||'',location:r.location||'',ownership:r.ownership||'',makeModel:r.make_model||'',condition:r.condition,description:r.description||'',meters:r.meters||[],planIds:r.plan_ids||[]};}
function woToRow(w,e){return {entity_id:e,id:w.id,asset_code:w.assetCode,name:w.name,trigger:w.trigger,kind:w.kind||'planned',task_type:w.taskType||null,freq:w.freq||null,season:w.season||null,usage_every:w.usageEvery??null,usage_unit:w.usageUnit||null,event:w.event||null,wx_rain:w.wxRain??null,due_date:w.dueDate?w.dueDate.slice(0,10):null,scheduled_date:w.scheduledDate?w.scheduledDate.slice(0,10):null,condition:w.condition||null,importance:w.importance||null,urgency:w.urgency||null,assigned_to:w.assignedTo||null,status:w.status||null,est_hours:w.estHours??null,est_cost:w.estCost??null,quote:w.quote??null,actual_cost:w.actualCost??null,hold_reason:w.holdReason||null,hold_since:w.holdSince?w.holdSince.slice(0,10):null,last_done:w.lastDone?w.lastDone.slice(0,10):null};}
function rowToWO(r){return {id:r.id,assetCode:r.asset_code,name:r.name,trigger:r.trigger,kind:r.kind,taskType:r.task_type,freq:r.freq,season:r.season,usageEvery:r.usage_every,usageUnit:r.usage_unit,event:r.event,wxRain:r.wx_rain,dueDate:r.due_date,scheduledDate:r.scheduled_date,condition:r.condition,importance:r.importance,urgency:r.urgency,assignedTo:r.assigned_to||'Unassigned',status:r.status,estHours:r.est_hours,estCost:r.est_cost,quote:r.quote,actualCost:r.actual_cost,holdReason:r.hold_reason,holdSince:r.hold_since,lastDone:r.last_done};}
function planToRow(p,e){return {entity_id:e,id:p.id,name:p.name,source:p.source||null,note:p.note||null,match:p.match||{},tasks:p.tasks||[]};}
function rowToPlan(r){return {id:r.id,name:r.name,source:r.source,note:r.note,match:r.match||{},tasks:r.tasks||[]};}
function histToRow(h,e){return {entity_id:e,id:h.id,asset_code:h.assetCode,wo_id:h.woId||null,task:h.task,date:h.date?h.date.slice(0,10):null,by:h.by||null,hours:h.hours??null,cost:h.cost??null,est_at_time:h.estAtTime??null,meter_at_done:h.meterAtDone??null,comment:h.comment||null};}
function rowToHist(r){return {id:r.id,assetCode:r.asset_code,woId:r.wo_id,task:r.task,date:r.date,by:r.by,hours:r.hours,cost:r.cost,estAtTime:r.est_at_time,meterAtDone:r.meter_at_done,comment:r.comment};}
function personToRow(p,e){return {entity_id:e,name:p.name,role:p.role||''};}
function rowToPerson(r){return {name:r.name,role:r.role||''};}

const Supa={
  _chan:null, _rt:null,
  async myEntities(){const{data,error}=await sb.from('entities').select('id,name').order('created_at');if(error)throw error;return data||[];},
  async roleFor(e){const{data}=await sb.from('entity_members').select('role').eq('entity_id',e).maybeSingle();return data?data.role:'viewer';},
  async members(e){try{const{data,error}=await sb.rpc('list_members',{p_entity:e});if(error)return null;return data||[];}catch(_){return null;}},
  async createStation(name){const{data,error}=await sb.rpc('create_station',{p_name:name});if(error)throw error;return data;},
  async invite(e,email,role){const{data,error}=await sb.rpc('add_member_by_email',{p_entity:e,p_email:email,p_role:role});if(error)throw error;return data;},
  async myInvitations(){try{const{data,error}=await sb.rpc('my_invitations');if(error)return [];return data||[];}catch(_){return [];}},
  async respond(e,accept){const{error}=await sb.rpc('respond_invitation',{p_entity:e,p_accept:accept});if(error)throw error;},
  async loadState(e){
    const [as,pl,wo,hi,pe,cf]=await Promise.all([
      sb.from('assets').select('*').eq('entity_id',e),
      sb.from('plans').select('*').eq('entity_id',e),
      sb.from('work_orders').select('*').eq('entity_id',e),
      sb.from('history').select('*').eq('entity_id',e),
      sb.from('people').select('*').eq('entity_id',e),
      sb.from('entity_config').select('*').eq('entity_id',e).maybeSingle()
    ]);
    const err=as.error||pl.error||wo.error||hi.error||pe.error;if(err)throw err;
    return {assets:(as.data||[]).map(rowToAsset),plans:(pl.data||[]).map(rowToPlan),
      workOrders:(wo.data||[]).map(rowToWO),history:(hi.data||[]).map(rowToHist),
      people:(pe.data||[]).map(rowToPerson),
      config:(cf.data&&cf.data.config)||{lat:-36.8485,lon:174.7633,place:'Auckland, NZ',rain:25,budget:0},
      seq:(cf.data&&cf.data.seq)||0};
  },
  async _delMissing(table,col,keep,e){
    const{data}=await sb.from(table).select(col).eq('entity_id',e);
    const keepSet=new Set(keep.map(String));
    for(const r of (data||[])){const v=r[col];if(!keepSet.has(String(v)))await sb.from(table).delete().eq('entity_id',e).eq(col,v);}
  },
  async saveState(e,st){
    await sb.from('assets').upsert(st.assets.map(a=>assetToRow(a,e)),{onConflict:'entity_id,code'});
    await this._delMissing('assets','code',st.assets.map(a=>a.code),e);
    await sb.from('plans').upsert(st.plans.map(p=>planToRow(p,e)),{onConflict:'entity_id,id'});
    await this._delMissing('plans','id',st.plans.map(p=>p.id),e);
    await sb.from('work_orders').upsert(st.workOrders.map(w=>woToRow(w,e)),{onConflict:'entity_id,id'});
    await this._delMissing('work_orders','id',st.workOrders.map(w=>w.id),e);
    if(st.history.length)await sb.from('history').upsert(st.history.map(h=>histToRow(h,e)),{onConflict:'entity_id,id'});
    if(st.people.length)await sb.from('people').upsert(st.people.map(p=>personToRow(p,e)),{onConflict:'entity_id,name'});
    await this._delMissing('people','name',st.people.map(p=>p.name),e);
    await sb.from('entity_config').upsert({entity_id:e,config:st.config||{},seq:st.seq||0},{onConflict:'entity_id'});
  },
  subscribe(e){
    if(this._chan){sb.removeChannel(this._chan);this._chan=null;}
    this._chan=sb.channel('rt-'+e);
    ['assets','plans','work_orders','history','people','entity_config'].forEach(t=>
      this._chan.on('postgres_changes',{event:'*',schema:'public',table:t,filter:'entity_id=eq.'+e},()=>this._onRemote()));
    this._chan.subscribe();
  },
  _onRemote(){
    clearTimeout(this._rt);
    this._rt=setTimeout(async()=>{
      if(Store._lastSave&&Date.now()-Store._lastSave<2500)return; // ignore echoes of our own writes
      try{const st=await this.loadState(activeEntity);Store.state=st;Store.migrate();render();}catch(e){}
    },900);
  }
};

async function boot(){
  applyBranding();
  if(SUPA_URL&&window.supabase){try{sb=window.supabase.createClient(SUPA_URL,SUPA_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});SUPA_OK=true;}catch(e){SUPA_OK=false;}}
  const av=$('#appVer');if(av)av.textContent='v'+APP_VERSION+(SUPA_OK?' \u00b7 cloud':' \u00b7 local');
  if(SUPA_OK){
    sb.auth.onAuthStateChange((evt,session)=>{
      if(session&&!activeEntity){initApp();}
      else if(!session){activeEntity=null;showLogin();}
    });
    const{data:{session}}=await sb.auth.getSession();
    if(session)await initApp(); else showLogin();
  } else {
    await Store.load();render();
  }
}
async function initApp(){
  hideLogin();
  try{
    const{data:{user}}=await sb.auth.getUser();myEmail=user?user.email:'';
    let ents=await Supa.myEntities();
    const invites=await Supa.myInvitations();
    if(!ents.length){
      if(invites&&invites.length)showInvitations(invites,true);
      else showEntitySetup();
      return;
    }
    allEntities=ents;
    if(!activeEntity||!ents.some(e=>e.id===activeEntity))activeEntity=ents[0].id;
    myRole=await Supa.roleFor(activeEntity);
    setReadonly(myRole==='viewer');
    Store.state=await Supa.loadState(activeEntity);Store.migrate();   // blank stays blank — never auto-seeded
    renderEntitySwitch();
    render();
    Supa.subscribe(activeEntity);
    if(invites&&invites.length)setTimeout(()=>showInvitations(invites,false),350);
  }catch(e){console.error(e);showLogin('Couldn\u2019t load your data: '+(e.message||e)+'. Check the schema ran and try again.');}
}
async function switchEntity(id){
  if(id===activeEntity)return;
  activeEntity=id;assetDetail=null;route='dashboard';
  myRole=await Supa.roleFor(id);setReadonly(myRole==='viewer');
  Store.state=await Supa.loadState(id);Store.migrate();
  renderEntitySwitch();render();Supa.subscribe(id);
}
function renderEntitySwitch(){
  const el=$('#entSwitch');if(!el)return;
  if(!SUPA_OK){el.innerHTML='';return;}
  const cur=allEntities.find(e=>e.id===activeEntity);
  if(allEntities.length<=1){el.innerHTML=`<div class="t-sub" style="font-size:11px;opacity:.8">${cur?cur.name:''}${myRole?' \u00b7 '+myRole:''}</div>`;return;}
  el.innerHTML=`<select id="entSel" style="width:100%;padding:7px;border-radius:7px;font-size:12px">${allEntities.map(e=>`<option value="${e.id}" ${e.id===activeEntity?'selected':''}>${e.name}</option>`).join('')}</select>`;
  $('#entSel').onchange=()=>switchEntity($('#entSel').value);
}
function showInvitations(list,blocking){
  hideLogin();
  const ov=document.createElement('div');ov.id='loginOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(30,28,20,.55);padding:20px';
  const cards=list.map(iv=>`<div class="inv-card" data-e="${iv.entity_id}" style="border:1px solid #e2dcca;border-radius:11px;padding:14px;margin-bottom:10px">

     <div class="t-sub" style="margin:2px 0 10px">You\u2019ve been invited as <b>${iv.role}</b></div>
     <div style="display:flex;gap:8px"><button class="inv-acc" data-e="${iv.entity_id}" style="flex:1;padding:9px;border:0;border-radius:8px;background:#2f5d3a;color:#fff;font-weight:700;cursor:pointer">Accept</button>
       <button class="inv-rej" data-e="${iv.entity_id}" style="flex:1;padding:9px;border:1px solid #cfc8b5;border-radius:8px;background:#fff;cursor:pointer">Reject</button></div></div>`).join('');
  ov.innerHTML=`<div style="max-width:420px;width:100%;background:var(--card,#fff);border:1px solid #e2dcca;border-radius:16px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.18)">
     <h2 style="margin:0 0 4px;font-size:20px">Station invitations</h2>
     <p class="t-sub" style="margin:0 0 14px">${blocking?'Accept one to get started, or create your own station.':'Someone has shared a station with you.'}</p>
     ${cards}
     <div style="text-align:center;margin-top:6px">${blocking?'<a href="#" id="inv_own" style="font-size:12.5px;color:#5b5b52">Create my own station instead</a>':'<button id="inv_later" style="border:0;background:none;color:#5b5b52;font-size:12.5px;cursor:pointer">Later</button>'}</div>
   </div>`;
  document.body.appendChild(ov);

  $$('.inv-acc',ov).forEach(b=>b.onclick=async()=>{b.disabled=true;try{await Supa.respond(b.dataset.e,true);activeEntity=b.dataset.e;hideLogin();initApp();}catch(e){alert(e.message||'Could not accept');b.disabled=false;}});
  $$('.inv-rej',ov).forEach(b=>b.onclick=async()=>{b.disabled=true;try{await Supa.respond(b.dataset.e,false);const c=ov.querySelector('.inv-card[data-e="'+b.dataset.e+'"]');if(c)c.remove();if(!ov.querySelector('.inv-card')){if(blocking)showEntitySetup();else hideLogin();}}catch(e){alert(e.message||'Could not reject');b.disabled=false;}});
  const own=$('#inv_own');if(own)own.onclick=(e)=>{e.preventDefault();showEntitySetup();};

function showLogin(msg){
  hideLogin();
  const ov=document.createElement('div');ov.id='loginOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--paper,#f3efe2);padding:20px';
  ov.innerHTML=`<div style="max-width:380px;width:100%;background:var(--card,#fff);border:1px solid #e2dcca;border-radius:16px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,.12)">
     <img src="${LOGO_GREEN}" alt="Ridgeward" style="height:38px;display:block;margin-bottom:12px"><div style="font-family:var(--font-narrow,sans-serif);text-transform:uppercase;letter-spacing:.16em;font-size:10.5px;color:#69756b;font-weight:700">Ready before it matters</div>
     <h2 id="lg_title" style="margin:6px 0 4px;font-size:22px">Sign in</h2>

     ${msg?`<div style="background:#fbeae6;color:#7a1f12;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:12px">${msg}</div>`:''}
     <input id="lg_email" type="email" autocomplete="username" placeholder="you@example.com" style="width:100%;padding:12px;border:1px solid #cfc8b5;border-radius:9px;font-size:15px;margin-bottom:10px">
     <input id="lg_pw" type="password" autocomplete="current-password" placeholder="Password" style="width:100%;padding:12px;border:1px solid #cfc8b5;border-radius:9px;font-size:15px;margin-bottom:10px">
     <button id="lg_btn" style="width:100%;padding:12px;border:0;border-radius:9px;background:#143A2E;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Sign in</button>
     <div id="lg_msg" style="font-size:12.5px;color:#5b5b52;margin-top:12px;text-align:center"></div>
     <div style="display:flex;justify-content:space-between;margin-top:14px;font-size:12.5px">
       <a href="#" id="lg_toggle" style="color:#143A2E;font-weight:600">Create an account</a>
       <a href="#" id="lg_forgot" style="color:#69756b">Forgot password?</a>
     </div>
   </div>`;
  document.body.appendChild(ov);
  let mode='signin';
  const setMode=m=>{mode=m;
    $('#lg_title').textContent=m==='signup'?'Create your account':'Sign in';
    $('#lg_sub').textContent=m==='signup'?'Pick a password (at least 6 characters). You can use the console straight away.':'Enter your email and password to continue.';
    $('#lg_btn').textContent=m==='signup'?'Create account':'Sign in';
    $('#lg_pw').setAttribute('autocomplete',m==='signup'?'new-password':'current-password');
    $('#lg_toggle').textContent=m==='signup'?'Have an account? Sign in':'Create an account';
    $('#lg_msg').textContent='';};
  const go=async()=>{

    if(!pw||pw.length<6){$('#lg_msg').textContent='Password must be at least 6 characters.';return;}
    $('#lg_btn').disabled=true;$('#lg_btn').textContent=mode==='signup'?'Creating\u2026':'Signing in\u2026';
    try{
      if(mode==='signup'){
        const{data,error}=await sb.auth.signUp({email,password:pw});
        if(error)throw error;
        if(data&&data.session){/* onAuthStateChange handles initApp */}
        else{$('#lg_msg').innerHTML='\u2713 Account created. If email confirmation is on, check your inbox, then sign in.';setMode('signin');}
      }else{
        const{error}=await sb.auth.signInWithPassword({email,password:pw});
        if(error)throw error;

    }catch(e){
      const m=(e.message||'').toLowerCase();
      $('#lg_msg').textContent=m.includes('invalid login')?'Email or password is incorrect.':m.includes('already registered')?'That email already has an account \u2014 sign in instead.':(e.message||'Could not authenticate');

  $('#lg_pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});

/* ----- due / scheduled logic ----- */
function dueClass(w){ // based on the GUIDE due date
  if(w.status==='Complete')return 'done';
  if(w.status==='On hold')return 'hold';
  if(!w.dueDate)return (w.trigger==='usage'||w.trigger==='event')?'trigger':'later';
  const dd=daysBetween(w.dueDate,TODAY);
  return dd<0?'overdue':dd<=30?'soon':'later';
}
function dueLabel(w){
  if(w.status==='Complete')return 'Done';
  if(w.status==='On hold')return 'On hold';
  if(w.trigger==='usage')return usageStatus(w)||w.condition||'By usage';
  if(w.trigger==='event')return 'On event';
  if(!w.dueDate)return 'No date';
  const dd=daysBetween(w.dueDate,TODAY);
  if(dd<0)return Math.abs(dd)+'d overdue';
  if(dd===0)return 'Due today';
  if(dd<=30)return 'in '+dd+'d';
  return fmtShort(w.dueDate);
}
const isScheduled=w=>!!w.scheduledDate&&w.status!=='Complete';
const effectiveDate=w=>w.scheduledDate||w.dueDate;
function openWOs(){return Store.state.workOrders.filter(w=>w.status!=='Complete'&&w.status!=='On hold');}
function heldWOs(){return Store.state.workOrders.filter(w=>w.status==='On hold');}
function groupByAsset(list){const m={};list.forEach(w=>{(m[w.assetCode]=m[w.assetCode]||[]).push(w);});return Object.keys(m).map(code=>({code,asset:assetByCode(code),items:m[code]}));}
const IUL=['High','Medium','Low'];
function prioMeta(w){
  const impS={High:3,Medium:2,Low:1}[w.importance]||2, urgS={High:3,Medium:2,Low:1}[w.urgency]||2;
  const important=w.importance==='High', urgent=w.urgency==='High';
  let q,label;
  if(important&&urgent){q=1;label='Do now';}
  else if(important&&!urgent){q=2;label='Plan';}
  else if(!important&&urgent){q=3;label='Delegate';}
  else{q=4;label='Later';}
  return {q,label,cls:'p'+q,score:impS*3+urgS};
}
function iuSelect(cls,val,wo){return `<select class="${cls}" data-wo="${wo}" title="${cls==='pimp'?'Importance':'Urgency'}">${IUL.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`;}

function filteredWOs(){
  return Store.state.workOrders.filter(w=>{
    const a=assetByCode(w.assetCode);const f=woFilter;
    const active=w.status!=='Complete'&&w.status!=='On hold';
    if(f.status==='open'&&!active)return false;
    if(f.status==='all'&&w.status==='Complete')return false;
    if(f.status==='Complete'&&w.status!=='Complete')return false;
    if(f.status==='On hold'&&w.status!=='On hold')return false;
    if(f.status==='inprogress'&&w.status!=='In Progress')return false;
    if(f.status==='improvement'&&w.kind!=='improvement')return false;
    if(f.status==='overdue'&&dueClass(w)!=='overdue')return false;
    if(f.status==='soon'&&dueClass(w)!=='soon')return false;
    if(f.status==='scheduled'&&!isScheduled(w))return false;
    if(f.status==='unscheduled'&&(isScheduled(w)||!active))return false;
    if(f.cat!=='all'&&a.category!==f.cat)return false;
    if(f.assignee!=='all'&&w.assignedTo!==f.assignee)return false;
    if(f.q&&!(w.name.toLowerCase().includes(f.q)||a.name.toLowerCase().includes(f.q)||a.code.toLowerCase().includes(f.q)))return false;
    return true;
  }).sort((a,b)=>{const oa=dueClass(a)==='overdue'?0:1,ob=dueClass(b)==='overdue'?0:1;if(oa!==ob)return oa-ob;return new Date(a.dueDate||'2099')-new Date(b.dueDate||'2099');});

function woGrouped(list,sort){
  sort=sort||'due';
  if(!list.length)return `<div class="card pad empty"><div class="big">No matching jobs</div>Nothing to show here.</div>`;
  let groups=groupByAsset(list);
  groups.forEach(g=>g.items.sort((a,b)=>woSortKey(a,sort)-woSortKey(b,sort)));
  if(sort==='asset')groups.sort((A,B)=>(A.asset?A.asset.name:A.code).localeCompare(B.asset?B.asset.name:B.code));
  else groups.sort((A,B)=>Math.min(...A.items.map(w=>woSortKey(w,sort)))-Math.min(...B.items.map(w=>woSortKey(w,sort))));
  return groups.map(g=>{
    const od=g.items.filter(w=>dueClass(w)==='overdue').length;
    const cost=g.items.reduce((s,w)=>s+(+w.estCost||0),0);
    return `<div class="card asset-grp">
      <div class="agh"><span class="linkish openAsset" data-c="${g.code}"><span class="plate">${g.code}</span> <b style="margin-left:7px">${esc(g.asset?g.asset.name:g.code)}</b></span>
        <span class="t-sub">${g.items.length} job${g.items.length!==1?'s':''}${od?` \u00b7 <span class="over">${od} overdue</span>`:''} \u00b7 ${money(Math.round(cost))}</span></div>
      <div class="tablewrap"><table><thead><tr><th>Task</th><th>Due</th><th>Scheduled</th><th>Priority</th><th>Status</th><th style="text-align:right">Cost</th><th>Assigned</th><th></th></tr></thead><tbody>${g.items.map(woRowGrouped).join('')}</tbody></table></div>
    </div>`;}).join('');
}

function viewWeek(v){
  const end=addDays(TODAY,7);
  const list=openWOs().filter(w=>{const d=effectiveDate(w);return d&&new Date(d)>=addDays(TODAY,-1)&&new Date(d)<=end;})
    .sort((a,b)=>new Date(effectiveDate(a))-new Date(effectiveDate(b)));
  $('#pageActs').innerHTML=`<button class="btn primary sm" id="icsBtn">\u2b07 Add week to calendar (.ics)</button>`;
  setTimeout(()=>{const b=$('#icsBtn');if(b)b.onclick=()=>exportICS(list);},0);
  v.innerHTML=`<div class="note blue">Download these as a calendar file (<b>.ics</b>) and open it to drop them straight into Outlook or any calendar. For automatic, hands-off syncing into <b>Microsoft To&nbsp;Do</b> or Outlook, see the migration pack \u2014 that uses an Airtable\u2192Power Automate/Zapier flow.</div>`;
  if(!list.length){v.insertAdjacentHTML('beforeend',`<div class="card pad empty" style="margin-top:14px"><div class="big">Nothing in the next 7 days</div>Schedule jobs under Work due, or include due-but-unscheduled items by scheduling them.</div>`);return;}
  v.insertAdjacentHTML('beforeend',`<div style="margin-top:14px">${woGrouped(list,'due')}</div>`);
  bindWoActions(v);
}
function exportICS(list){
  if(!list.length){toast('Nothing to export this week');return;}
  const dt=d=>new Date(d).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Station Maintenance Console//EN','CALSCALE:GREGORIAN'];
  list.forEach(w=>{const a=assetByCode(w.assetCode);const d=effectiveDate(w);const start=new Date(d);start.setHours(8,0,0,0);const endt=new Date(start.getTime()+ (w.estHours||1)*3600000);
    lines.push('BEGIN:VEVENT','UID:'+w.id+'@station','DTSTAMP:'+dt(TODAY),'DTSTART:'+dt(start),'DTEND:'+dt(endt),
      'SUMMARY:'+w.name+' \u2014 '+a.name+' ('+a.code+')',
      'DESCRIPTION:'+(w.assignedTo||'')+' \u00b7 est '+(w.estHours||0)+'h \u00b7 '+money(w.estCost),'END:VEVENT');});
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='station-week.ics';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast('Calendar file downloaded \u2014 open it to add to Outlook');
}

/* ============== WORKLOAD PLAN ============== */
function viewSchedule(v){
  const months=[];for(let i=0;i<6;i++){const m=addMonths(TODAY,i);months.push({y:m.getFullYear(),m:m.getMonth(),items:[],h:0,c:0});}
  openWOs().forEach(w=>{const d=effectiveDate(w);if(!d)return;const dt=new Date(d);const slot=months.find(mo=>mo.y===dt.getFullYear()&&mo.m===dt.getMonth());if(slot){slot.items.push(w);slot.h+=+w.estHours||0;slot.c+=+w.estCost||0;}});
  const maxH=Math.max(...months.map(m=>m.h),1);
  const tH=months.reduce((s,m)=>s+m.h,0),tC=months.reduce((s,m)=>s+m.c,0);
  v.innerHTML=`<div class="note">Plots date-bound jobs using your <b>scheduled</b> date where set, otherwise the guide <b>due</b> date. Usage and event-triggered jobs live under Work due. Six-month load: <b>${tH.toFixed(0)}h</b> and <b>${money(Math.round(tC))}</b>.</div>
    <div class="cal" style="margin-top:16px">${months.map(mo=>{const name=new Date(mo.y,mo.m,1).toLocaleDateString('en-NZ',{month:'long'});
      const items=mo.items.sort((a,b)=>new Date(effectiveDate(a))-new Date(effectiveDate(b))).slice(0,6);const extra=mo.items.length-items.length;
      return `<div class="mo"><h6><span>${name} ${String(mo.y).slice(2)}</span><span class="load">${mo.h.toFixed(0)}h</span></h6>
        <div class="bar"><i style="width:${Math.round(mo.h/maxH*100)}%"></i></div>
        <ul>${items.map(w=>`<li class="${isScheduled(w)?'sc':''}"><span class="pd">${new Date(effectiveDate(w)).getDate()}</span><span>${w.name}</span></li>`).join('')||'<li style="border:0;color:var(--slate-2)">\u2014</li>'}${extra>0?`<li style="border:0;color:var(--slate)">+${extra} more</li>`:''}</ul></div>`;}).join('')}</div>`;

function digestItems(){
  return openWOs().filter(w=>{const d=digFilter.basis==='scheduled'?w.scheduledDate:w.dueDate;if(!d)return false;
    const dd=daysBetween(d,TODAY);if(!(dd<=digFilter.window))return false;
    if(digFilter.assignee!=='all'&&w.assignedTo!==digFilter.assignee)return false;return true;})
    .sort((a,b)=>new Date(digFilter.basis==='scheduled'?a.scheduledDate:a.dueDate)-new Date(digFilter.basis==='scheduled'?b.scheduledDate:b.dueDate));
}
function digestExtras(){
  const cfg=Store.state.config;const budget=+cfg.budget||0;const fy=fyStart(TODAY);
  const actualFY=Store.state.history.filter(h=>fyStart(h.date)===fy).reduce((s,h)=>s+(+h.cost||0),0);
  const openEst=openWOs().reduce((s,w)=>s+(+w.estCost||0),0);
  const comp=openWOs().filter(isComply).map(w=>({code:w.assetCode,name:assetByCode(w.assetCode).name,label:w.name,date:w.dueDate}));
  const exp=[];Store.state.assets.forEach(a=>(a.meters||[]).filter(m=>m.kind==='expiry'&&m.date).forEach(m=>exp.push({code:a.code,name:a.name,label:m.label,date:m.date})));
  const compAll=comp.concat(exp);
  const compOverdue=compAll.filter(it=>it.date&&daysBetween(it.date,TODAY)<0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const sched30=openWOs().filter(w=>w.scheduledDate&&daysBetween(w.scheduledDate,TODAY)>=0&&daysBetween(w.scheduledDate,TODAY)<=30).sort((a,b)=>new Date(a.scheduledDate)-new Date(b.scheduledDate));
  const done30=Store.state.history.filter(h=>{const dd=daysBetween(TODAY,h.date);return dd>=0&&dd<=30;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const held=heldWOs().slice().sort((a,b)=>new Date(a.holdSince||0)-new Date(b.holdSince||0));
  return {budget,fy,actualFY,openEst,compOverdue,sched30,done30,held};
}
function renderDigest(el){

  const tC=items.reduce((s,w)=>s+(+w.estCost||0),0);
  const overB=x.budget&&x.actualFY>x.budget;
  let html=`<div class="digest-out"><div class="eyebrow">Property maintenance update \u00b7 prepared ${fmtDate(TODAY)}</div>
    <h4>Station update \u2014 ${digFilter.assignee==='all'?'all areas':digFilter.assignee}</h4>
    <div style="margin:10px 0 4px">
      <span class="dg-stat"><b class="${overB?'over':''}">${money(Math.round(x.actualFY))}</b><span>Spent ${fyLabel(x.fy)}</span></span>
      ${x.budget?`<span class="dg-stat"><b>${money(x.budget)}</b><span>Budget${overB?' \u00b7 over':''}</span></span>`:''}
      <span class="dg-stat"><b>${money(Math.round(x.openEst))}</b><span>Open est.</span></span>
      <span class="dg-stat"><b class="${x.compOverdue.length?'over':''}">${x.compOverdue.length}</b><span>Compliance overdue</span></span>
    </div>`;
  if(x.compOverdue.length){html+=`<div class="digest-sub" style="color:var(--rust)">Overdue compliance \u2014 act now</div>`+
    x.compOverdue.slice(0,8).map(it=>`<div class="digest-item"><span class="d od">${Math.abs(daysBetween(it.date,TODAY))}d over</span><span style="flex:1"><b>${it.label}</b> \u2014 ${it.name} <span class="plate" style="font-size:10px">${it.code}</span></span></div>`).join('');}
  html+=`<div class="digest-sub">Upcoming work \u00b7 next ${digFilter.window} days</div>`;
  html+=items.length?Object.entries(groups).map(([k,list])=>`<div class="digest-grp"><h5>${k} \u2014 ${list.length} job${list.length!==1?'s':''}</h5>
      ${list.map(w=>{const a=assetByCode(w.assetCode);const basis=digFilter.basis==='scheduled'?w.scheduledDate:w.dueDate;const dd=daysBetween(basis,TODAY);
        return `<div class="digest-item"><span class="d ${dd<0?'od':''}">${dd<0?Math.abs(dd)+'d overdue':dd===0?'today':fmtShort(basis)}</span>
          <span style="flex:1"><b>${w.name}</b> \u2014 ${a.name} <span class="plate" style="font-size:10px">${a.code}</span></span>
          <span class="t-sub">${w.assignedTo!=='Unassigned'?w.assignedTo:'<i>unassigned</i>'}</span></div>`;}).join('')}</div>`).join(''):'<div class="t-sub">Nothing due in this window.</div>';
  html+=`<div class="digest-sub">Scheduled \u00b7 next 30 days (${x.sched30.length})</div>`;
  html+=x.sched30.length?x.sched30.slice(0,20).map(w=>{const a=assetByCode(w.assetCode);return `<div class="digest-item"><span class="d">${fmtShort(w.scheduledDate)}</span><span style="flex:1"><b>${w.name}</b> \u2014 ${a.name} <span class="plate" style="font-size:10px">${a.code}</span></span><span class="t-sub">${w.assignedTo!=='Unassigned'?w.assignedTo:''}</span></div>`;}).join(''):'<div class="t-sub">Nothing committed to a date yet.</div>';
  if(x.held.length){const hg=groupByAsset(x.held);html+=`<div class="digest-sub">On hold \u00b7 ${hg.length} asset${hg.length!==1?'s':''} (${x.held.length} task${x.held.length!==1?'s':''})</div>`+
    hg.map(g=>`<div class="digest-item" style="display:block"><div><span class="plate" style="font-size:10px">${g.code}</span> <b>${g.asset?g.asset.name:g.code}</b></div>${g.items.map(w=>`<div style="margin:2px 0 0 14px;font-size:12px;color:var(--slate)">\u2022 ${w.name}${w.holdReason?' \u2014 '+w.holdReason.replace(/</g,'&lt;'):''}</div>`).join('')}</div>`).join('');}
  html+=`<div class="digest-sub">Completed \u00b7 past 30 days (${x.done30.length})</div>`;
  html+=x.done30.length?x.done30.slice(0,20).map(h=>{const a=assetByCode(h.assetCode);return `<div class="digest-item"><span class="d" style="color:var(--green-ok)">${fmtShort(h.date)}</span><span style="flex:1"><b>${h.task}</b> \u2014 ${a?a.name:''} ${a?`<span class="plate" style="font-size:10px">${a.code}</span>`:''}${h.comment?` \u00b7 <span class="t-sub">${h.comment.replace(/</g,'&lt;')}</span>`:''}</span><span class="t-sub">${h.cost!=null?money(h.cost):''}</span></div>`;}).join(''):'<div class="t-sub">Nothing logged in the past 30 days.</div>';
  html+=`<div class="t-sub" style="margin-top:18px;border-top:1px solid var(--paper-2);padding-top:10px">Generated by Station Maintenance Console.</div></div>`;
  el.innerHTML=html;
}
function digestText(){
  const items=digestItems();const x=digestExtras();const groups={};items.forEach(w=>{const k=digFilter.group==='category'?assetByCode(w.assetCode).category:w.assignedTo;(groups[k]=groups[k]||[]).push(w);});
  const out=[`STATION MAINTENANCE UPDATE \u2014 ${fmtDate(TODAY)}`,
    `Spent ${fyLabel(x.fy)}: ${money(Math.round(x.actualFY))}${x.budget?' of '+money(x.budget):''} | Open estimate: ${money(Math.round(x.openEst))} | Compliance overdue: ${x.compOverdue.length}`,''];
  if(x.compOverdue.length){out.push('!! OVERDUE COMPLIANCE');x.compOverdue.forEach(it=>out.push(`  [${Math.abs(daysBetween(it.date,TODAY))}d over] ${it.label} \u2014 ${it.name} (${it.code})`));out.push('');}
  out.push('UPCOMING \u00b7 next '+digFilter.window+' days'+(digFilter.assignee!=='all'?' \u00b7 '+digFilter.assignee:''));
  Object.entries(groups).forEach(([k,list])=>{out.push(' == '+k+' ==');list.forEach(w=>{const a=assetByCode(w.assetCode);const basis=digFilter.basis==='scheduled'?w.scheduledDate:w.dueDate;const dd=daysBetween(basis,TODAY);out.push(`  [${dd<0?Math.abs(dd)+'d overdue':dd===0?'today':fmtShort(basis)}] ${w.name} \u2014 ${a.name} (${a.code})${w.assignedTo!=='Unassigned'?' \u2192 '+w.assignedTo:''}`);});});
  out.push('','SCHEDULED \u00b7 next 30 days');x.sched30.forEach(w=>{const a=assetByCode(w.assetCode);out.push(`  [${fmtShort(w.scheduledDate)}] ${w.name} \u2014 ${a.name} (${a.code})`);});if(!x.sched30.length)out.push('  (none)');
  if(x.held.length){out.push('','ON HOLD');groupByAsset(x.held).forEach(g=>{out.push('  '+(g.asset?g.asset.name:g.code)+' ('+g.code+')');g.items.forEach(w=>out.push('    \u2022 '+w.name+(w.holdReason?' \u2014 '+w.holdReason:'')));});}
  out.push('','COMPLETED \u00b7 past 30 days');x.done30.forEach(h=>{const a=assetByCode(h.assetCode);out.push(`  [${fmtShort(h.date)}] ${h.task} \u2014 ${a?a.name:''}${h.cost!=null?' \u00b7 '+money(h.cost):''}${h.comment?' \u00b7 '+h.comment:''}`);});if(!x.done30.length)out.push('  (none)');
  return out.join('\n');
}

function buildWO(assetCode,t){
  Store.state.seq++;let dueDate=null,cond=null;
  if(t.trigger==='time'){dueDate=iso(addDays(TODAY,FREQ_DAYS[t.freq]||365));}
  else if(t.trigger==='seasonal'){dueDate=iso(nextSeasonStart(t.season,TODAY));}
  else if(t.trigger==='usage'){cond='Every '+t.usageEvery+' '+(t.usageUnit||'hrs');}
  else if(t.trigger==='event'){cond=t.event;}
  else if(t.trigger==='reactive'){dueDate=iso(t.dueDate||TODAY);}
  else if(t.trigger==='oneoff'){dueDate=t.dueDate?iso(t.dueDate):null;}
  const map={Critical:['High','High'],High:['High','Medium'],Medium:['Medium','Medium'],Low:['Low','Low']};
  const m=map[t.priority]||['Medium','Medium'];
  return {id:'WO-'+String(Store.state.seq).padStart(4,'0'),assetCode,name:t.name,trigger:t.trigger,kind:t.kind||'planned',
    freq:t.freq||null,season:t.season||null,usageEvery:t.usageEvery||null,usageUnit:t.usageUnit||null,event:t.event||null,wxRain:t.wxRain||null,
    estHours:t.estHours,estCost:t.estCost,importance:t.importance||m[0],urgency:t.urgency||m[1],taskType:t.taskType||'Preventive',
    dueDate,scheduledDate:null,condition:cond,assignedTo:'Unassigned',status:'Open',quote:null,actualCost:null};
}

// usage projection from meter + last service reading
function usageStatus(w){
  const a=assetByCode(w.assetCode);const m=readingMeter(a);
  if(w.trigger!=='usage')return null;
  if(!m)return 'Every '+w.usageEvery+' '+(w.usageUnit||'hrs');
  const last=Store.state.history.filter(h=>h.woId===w.id&&h.meterAtDone!=null).sort((x,y)=>new Date(y.date)-new Date(x.date))[0];
  const base=last?last.meterAtDone:null;
  if(base==null)return 'Every '+w.usageEvery+' '+m.unit+' \u00b7 now '+m.value;
  const used=m.value-base;const left=w.usageEvery-used;
  return left<=0?Math.abs(Math.round(left))+' '+m.unit+' overdue':Math.round(left)+' '+m.unit+' to go';
}

function suggestCode(category){const pre=CODE_PREFIX[category]||'AST';let mx=0;
  Store.state.assets.forEach(a=>{if(a.code.startsWith(pre+'-')){const n=parseInt(a.code.split('-')[1]);if(n>mx)mx=n;}});
  return pre+'-'+String(mx+1).padStart(3,'0');}
function mapInterval(text){t=(text||'').toLowerCase();
  if(/hour|hr|\bh\b/.test(t)){const m=t.match(/(\d[\d,]*)\s*(hour|hr)/);return{trigger:'usage',usageEvery:m?+m[1].replace(/,/g,''):250,usageUnit:'hrs'};}
  if(/km|mile/.test(t)){const m=t.match(/(\d[\d,]*)\s*(km|mile)/);return{trigger:'usage',usageEvery:m?+m[1].replace(/,/g,''):10000,usageUnit:'km'};}
  if(/quarter|3\s*month/.test(t))return{trigger:'time',freq:'Quarterly'};
  if(/fortnight|2\s*week/.test(t))return{trigger:'time',freq:'Fortnightly'};
  if(/month/.test(t))return{trigger:'time',freq:'Monthly'};
  if(/week/.test(t))return{trigger:'time',freq:'Weekly'};
  if(/season|winter|spring|summer|autumn/.test(t)){const s=(t.match(/winter|spring|summer|autumn/)||['Autumn'])[0];return{trigger:'seasonal',season:s[0].toUpperCase()+s.slice(1)};}
  return{trigger:'time',freq:'Annual'};
}

async function doOEM(){
  const make=$('#w_make').value.trim();
  if(!make){toast('Enter a make/model first');return;}
  const btn=$('#w_oem');const orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spin"></span> Searching\u2026';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Find the manufacturer-recommended scheduled maintenance for a "${make}". Also include New Zealand statutory items (WOF, registration) if it is a road vehicle. Respond with ONLY a JSON array, no prose, no markdown fences. Each element: {"name": string, "interval": string (e.g. "Annual","every 250 hours","every 10,000 km"), "priority": "Low"|"Medium"|"High", "est_hours": number, "est_cost_nzd": number}. 4-8 items.`}]})});
    const data=await res.json();
    let text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    text=text.replace(/```json|```/g,'').trim();
    const arr=JSON.parse(text.slice(text.indexOf('['),text.lastIndexOf(']')+1));
    const mapped=arr.map(o=>{const m=mapInterval(o.interval);return {name:o.name,priority:o.priority||'Medium',estHours:+o.est_hours||1,estCost:+o.est_cost_nzd||0,taskType:'Preventive',_on:true,_src:'OEM',...m};});
    // merge, avoid dupes by name
    const have=new Set(wizTasks.map(t=>t.name.toLowerCase()));
    mapped.forEach(t=>{if(!have.has(t.name.toLowerCase()))wizTasks.push(t);});
    $('#w_hint').innerHTML=`Added ${mapped.length} manufacturer-recommended tasks for <b>${make}</b> <span class="tag src-OEM">OEM \u00b7 web</span>. Review intervals and tick what applies.`;
    renderWizTasks();toast('OEM schedule added');
  }catch(e){
    $('#w_hint').innerHTML=`Couldn\u2019t fetch an OEM schedule automatically (the live lookup needs the in-app AI connection). The best-practice plan for this type still applies \u2014 add anything else manually.`;
    toast('OEM lookup unavailable here');
  }finally{btn.disabled=false;btn.innerHTML=orig;}
}

let wxCache=null;
function wxIcon(code){if(code===0)return '\u2600';if(code<=3)return '\u26c5';if(code<=48)return '\u2601';if(code<=67||(code>=80&&code<=82))return '\u2602';if(code<=77||code<=86)return '\u2744';if(code>=95)return '\u26a1';return '\u2601';}
async function renderWeather(){

  card.innerHTML=`<div class="card pad"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="eyebrow">Live weather watch</div><h3 style="margin:2px 0 0;font-size:16px">${cfg.place}</h3></div><div class="t-sub">checking forecast\u2026 <span class="spin" style="border-top-color:var(--pine)"></span></div></div></div>`;

      const r=await fetch(u);const d=await r.json();if(d&&d.daily)wxCache={daily:d.daily,sample:false};
    }catch(e){}

      const days=[],rain=[],prob=[],code=[],gust=[];const base=new Date(TODAY);

      for(let i=0;i<7;i++){days.push(ymd(addDays(base,i)));rain.push(sampleRain[i]);prob.push(sampleRain[i]>20?90:sampleRain[i]>0?40:5);code.push(sampleRain[i]>20?82:sampleRain[i]>0?61:1);gust.push(sampleRain[i]>20?65:25);}
      wxCache={daily:{time:days,precipitation_sum:rain,precipitation_probability_max:prob,weathercode:code,windgusts_10m_max:gust},sample:true};
    }

    insight=`<div class="insight"><div class="ix">\u26a1</div><div class="it"><b>Heavy rain (${a.r.toFixed(0)}mm) forecast ${when}.</b> ${eventJobs.length} weather-contingent ${eventJobs.length===1?'check is':'checks are'} on file (culvert clearing, track scour, bridge post-flood). Schedule them for the day before?</div>
      <button class="btn primary sm editonly" id="wxSched">Add ${eventJobs.length} checks to ${dt.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})}</button></div>`;}
  card.innerHTML=`<div class="card pad">
    <div style="display:flex;justify-content:space-between;align-items:center"><div><div class="eyebrow">Live weather watch${sample?' \u00b7 sample data':''}</div><h3 style="margin:2px 0 0;font-size:16px">${cfg.place}</h3></div>
      <div style="text-align:right"><div class="t-sub">rain alert \u2265 ${thr}mm/day</div><span class="muted-link editonly" id="wxCfg">change location / threshold</span></div></div>
    <div class="wx">${strip}</div>${insight}
    ${sample?'<div class="t-sub" style="margin-top:8px;font-size:11px">Live forecast couldn\u2019t be fetched here, so this is sample data. In the installed version it pulls your property\u2019s real 7-day forecast from Open-Meteo (free, no key). Source: Open-Meteo, CC BY 4.0.</div>':'<div class="t-sub" style="margin-top:8px;font-size:11px">Forecast: Open-Meteo (free, no key, CC BY 4.0).</div>'}
  </div>`;
  const sb=$('#wxSched');if(sb)sb.onclick=()=>{const a=alertIdx[0];const day=ymd(addDays(new Date(a.t),-1));scheduleWeatherJobs(day);};

function openAssetEdit(code){
  const a=assetByCode(code);const cats=[...new Set(Store.state.assets.map(x=>x.category))];
  showModal(`<header><h3>Edit asset \u2014 ${a.code}</h3><button class="btn ghost sm" onclick="closeModal()">\u2715</button></header>
   <div class="body">
     <div class="row2"><label><span class="eyebrow">Name</span><input id="ae_name" value="${(a.name||'').replace(/"/g,'&quot;')}"></label>
       <label><span class="eyebrow">Code</span><input id="ae_code" value="${a.code}"></label></div>
     <div class="row2"><label><span class="eyebrow">Category</span><select id="ae_cat">${cats.map(c=>`<option ${c===a.category?'selected':''}>${c}</option>`).join('')}</select></label>
       <label><span class="eyebrow">Subcategory</span><input id="ae_sub" value="${(a.subcategory||'').replace(/"/g,'&quot;')}"></label></div>
     <div class="row2"><label><span class="eyebrow">Location</span><input id="ae_loc" value="${(a.location||'').replace(/"/g,'&quot;')}"></label>
       <label><span class="eyebrow">Owner</span><input id="ae_own" value="${(a.ownership||'').replace(/"/g,'&quot;')}"></label></div>
     <div class="row2"><label><span class="eyebrow">Make / model</span><input id="ae_mm" value="${(a.makeModel||'').replace(/"/g,'&quot;')}"></label>
       <label><span class="eyebrow">Condition (1-5)</span><input id="ae_cond" type="number" min="1" max="5" value="${a.condition||''}"></label></div>
     <label><span class="eyebrow">Notes</span><textarea id="ae_desc" rows="2">${(a.description||'').replace(/</g,'&lt;')}</textarea></label>
   </div>
   <footer><button class="btn sm" id="ae_del" style="border-color:#7a1f12;color:#7a1f12">Delete asset</button>
     <div style="display:flex;gap:8px"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" id="ae_save">Save</button></div></footer>`,true);
  $('#ae_save').onclick=()=>{const newCode=$('#ae_code').value.trim()||a.code;
    if(newCode!==a.code){if(Store.state.assets.some(x=>x.code===newCode)){toast('Code already exists');return;}
      Store.state.workOrders.forEach(w=>{if(w.assetCode===a.code)w.assetCode=newCode;});Store.state.history.forEach(h=>{if(h.assetCode===a.code)h.assetCode=newCode;});}
    a.name=$('#ae_name').value.trim()||a.name;a.code=newCode;a.category=$('#ae_cat').value;a.subcategory=$('#ae_sub').value.trim();
    a.location=$('#ae_loc').value.trim();a.ownership=$('#ae_own').value.trim();a.makeModel=$('#ae_mm').value.trim();
    a.condition=+$('#ae_cond').value||a.condition;a.description=$('#ae_desc').value.trim();
    Store.save();closeModal();assetDetail=a.code;toast('Asset updated');render();};
  $('#ae_del').onclick=()=>{if(confirm('Delete '+a.code+' ('+a.name+') and all its scheduled work? Service history is kept.')){
    Store.state.assets=Store.state.assets.filter(x=>x.code!==a.code);
    Store.state.workOrders=Store.state.workOrders.filter(w=>w.assetCode!==a.code);
    Store.save();closeModal();assetDetail=null;route='assets';toast('Asset deleted');render();}};
}

/* ---- Cost & compliance dashboard (hardened) ---- */
function fyStart(d){const x=new Date(d);return x.getMonth()>=3?x.getFullYear():x.getFullYear()-1;} // NZ FY starts 1 Apr
function fyLabel(y){return 'FY'+String(y%100).padStart(2,'0')+'/'+String((y+1)%100).padStart(2,'0');}
let costFY=fyStart(TODAY);
function viewCosts(v){
  const cfg=Store.state.config;
  // available FYs from history + current
  const fys=[...new Set(Store.state.history.map(h=>fyStart(h.date)).concat([fyStart(TODAY)]))].sort((a,b)=>b-a);
  if(!fys.includes(costFY))costFY=fys[0];
  const inFY=h=>fyStart(h.date)===costFY;
  const histFY=Store.state.history.filter(inFY);
  const open=openWOs();
  const estOpen=open.reduce((s,w)=>s+(+w.estCost||0),0);
  const quoted=open.filter(w=>w.quote!=null).reduce((s,w)=>s+(+w.quote||0),0);
  const actualFY=histFY.reduce((s,h)=>s+(+h.cost||0),0);
  const budget=+cfg.budget||0;
  const overspends=histFY.filter(h=>h.estAtTime!=null&&h.cost!=null&&h.cost>h.estAtTime);
  // monthly buckets Apr..Mar
  const months=[];for(let i=0;i<12;i++){const m=(3+i)%12;months.push({m,label:new Date(2000,m,1).toLocaleDateString('en-NZ',{month:'short'}),v:0});}
  histFY.forEach(h=>{const mi=(new Date(h.date).getMonth()-3+12)%12;months[mi].v+=+h.cost||0;});
  const maxM=Math.max(...months.map(m=>m.v),1);
  // category
  const cat={};open.forEach(w=>{const c=assetByCode(w.assetCode).category;(cat[c]=cat[c]||{est:0,act:0});cat[c].est+=+w.estCost||0;});
  histFY.forEach(h=>{const a=assetByCode(h.assetCode);if(!a)return;(cat[a.category]=cat[a.category]||{est:0,act:0});cat[a.category].act+=+h.cost||0;});
  const comply=open.filter(isComply).sort((a,b)=>new Date(a.dueDate||'2099')-new Date(b.dueDate||'2099'));
  const compOverdue=comply.filter(w=>dueClass(w)==='overdue');

  $('#pageActs').innerHTML=`<select id="fyy" class="editonly">${fys.map(y=>`<option value="${y}" ${y===costFY?'selected':''}>${fyLabel(y)}</option>`).join('')}</select> <button class="btn sm editonly" id="setBudget">Set budget</button>`;
  setTimeout(()=>{const s=$('#fyy');if(s)s.onchange=()=>{costFY=+s.value;render();};const b=$('#setBudget');if(b)b.onclick=()=>{const val=prompt('Annual maintenance budget for '+fyLabel(costFY)+' (NZD):',budget||'');if(val!==null){cfg.budget=+val||0;Store.save();render();}};},0);

  v.innerHTML=`<div class="grid stats">
     <div class="card stat cost"><div class="edge"></div><div class="lbl">Open est. (master)</div><div class="num">${money(Math.round(estOpen))}</div><div class="meta">${open.length} open jobs</div></div>
     <div class="card stat soon"><div class="edge"></div><div class="lbl">Quoted</div><div class="num">${money(Math.round(quoted))}</div><div class="meta">where quotes entered</div></div>
     <div class="card stat ok"><div class="edge"></div><div class="lbl">Actual \u00b7 ${fyLabel(costFY)}</div><div class="num">${money(Math.round(actualFY))}</div><div class="meta">${histFY.length} completions</div></div>
     <div class="card stat ${compOverdue.length?'overdue':'ok'}"><div class="edge"></div><div class="lbl">Compliance overdue</div><div class="num">${compOverdue.length}</div><div class="meta">statutory items</div></div>
   </div>`;
  // budget vs actual
  if(budget>0){const pct=Math.min(100,Math.round(actualFY/budget*100));const over=actualFY>budget;
    v.insertAdjacentHTML('beforeend',`<div class="card pad" style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:baseline"><div class="eyebrow">Budget \u00b7 ${fyLabel(costFY)}</div><div class="t-sub">${money(Math.round(actualFY))} of ${money(budget)} \u00b7 <span class="${over?'over':'under'}">${over?'over by '+money(Math.round(actualFY-budget)):money(Math.round(budget-actualFY))+' left'}</span></div></div>
      <div class="varbar" style="margin-top:8px"><i style="width:${pct}%;background:${over?'var(--rust)':'var(--green-ok)'}"></i></div></div>`);
  } else {
    v.insertAdjacentHTML('beforeend',`<div class="note" style="margin-top:16px">No budget set for ${fyLabel(costFY)}. Use <b>Set budget</b> (top right) to track spend against a target.</div>`);
  }
  // monthly chart
  v.insertAdjacentHTML('beforeend',`<div class="section-h"><div><div class="eyebrow">Actual spend by month</div><h3>${fyLabel(costFY)}</h3></div></div>
    <div class="card pad"><div style="display:flex;align-items:flex-end;gap:6px;height:140px">${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%">
       <div style="font-family:var(--font-mono);font-size:9px;color:var(--slate)">${m.v?money(Math.round(m.v)).replace('$',''):''}</div>
       <div style="width:100%;background:var(--amber);border-radius:4px 4px 0 0;height:${Math.round(m.v/maxM*100)}%;min-height:${m.v?3:0}px"></div>
       <div style="font-size:10px;color:var(--slate)">${m.label}</div></div>`).join('')}</div></div>`);
  // compliance
  v.insertAdjacentHTML('beforeend',`<div class="section-h"><div><div class="eyebrow">Can\u2019t-miss items</div><h3>Compliance watch</h3></div><span class="t-sub">WOF, rego, safety, survey</span></div>`);
  // unified list: compliance work orders + expiry meters
  const expiries=[];Store.state.assets.forEach(a=>(a.meters||[]).filter(m=>m.kind==='expiry'&&m.date).forEach(m=>expiries.push({code:a.code,name:a.name,label:m.label,date:m.date})));
  const compItems=comply.map(w=>({code:w.assetCode,name:assetByCode(w.assetCode).name,label:w.name,date:w.dueDate,_wo:w}))
    .concat(expiries).sort((a,b)=>new Date(a.date||'2099')-new Date(b.date||'2099'));
  v.insertAdjacentHTML('beforeend',compItems.length?`<div class="card pad complist">${compItems.slice(0,24).map(it=>{const dd=it.date?daysBetween(it.date,TODAY):null;const od=dd!=null&&dd<0;const cls=od?'overdue':(dd!=null&&dd<=30?'soon':'later');
     return `<div class="ci"><span class="plate">${it.code}</span><span style="flex:1"><b>${it.label}</b> \u00b7 ${it.name}</span><span class="due-cell"><span class="tag ${cls}">${dd==null?'\u2014':od?Math.abs(dd)+'d overdue':dd===0?'today':fmtShort(it.date)}</span></span>${od?'<span class="esc">Escalate</span>':''}</div>`;}).join('')}</div>`:`<div class="card pad empty">No statutory items detected.</div>`);
  // cost by category
  v.insertAdjacentHTML('beforeend',`<div class="section-h"><div><div class="eyebrow">Where the money goes</div><h3>Cost by category</h3></div></div>`);
  const rows=Object.entries(cat).sort((a,b)=>(b[1].est+b[1].act)-(a[1].est+a[1].act)).map(([c,o])=>`<tr><td><span class="dot cat-${catKey(c)}"></span> <span style="margin-left:6px">${c}</span></td><td class="num-cell">${money(Math.round(o.est))}</td><td class="num-cell">${money(Math.round(o.act))}</td></tr>`).join('');
  v.insertAdjacentHTML('beforeend',`<div class="tablewrap"><table><thead><tr><th>Category</th><th style="text-align:right">Open estimate</th><th style="text-align:right">Actual (${fyLabel(costFY)})</th></tr></thead><tbody>${rows}</tbody></table></div>`);
  // overspend flags
  v.insertAdjacentHTML('beforeend',`<div class="section-h"><div><div class="eyebrow">Estimate vs actual</div><h3>Jobs that ran over</h3></div></div>`);
  v.insertAdjacentHTML('beforeend',overspends.length?`<div class="card pad complist">${overspends.slice(0,15).map(h=>{const a=assetByCode(h.assetCode);return `<div class="ci"><span class="plate">${h.assetCode}</span><span style="flex:1"><b>${h.task}</b> \u00b7 ${a?a.name:''} \u00b7 ${fmtShort(h.date)}</span><span class="t-sub">est ${money(h.estAtTime)} \u2192 <span class="over">${money(h.cost)}</span></span></div>`;}).join('')}</div>`:`<div class="card pad empty">No overspends logged in ${fyLabel(costFY)}.</div>`);
}

      const summary=[...rd.map(m=>m.label+': '+(m.value!=null?m.value+(m.unit?' '+m.unit:''):'\u2014')),...ex.map(m=>m.label+': '+(m.date?fmtShort(m.date):'\u2014'))].join(' \u00b7 ');
      return `<div class="field-card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline"><div class="fh">${a.name}</div><span class="plate">${a.code}</span></div>
        <div class="fm">${a.subcategory||''} \u00b7 ${a.location||'\u2014'}${summary?'<br>'+summary:''}</div>
        <div class="fbtns">${ms.length?`<button class="btn primary fMeters editonly" data-c="${a.code}">Update readings</button>`:''}<button class="btn fEdit editonly" data-c="${a.code}">Edit details</button></div></div>`;}).join('')||'<div class="card pad empty">No assets match.</div>'}
    </div>`;
  $('#ftJobs').onclick=()=>{fieldTab='jobs';render();};$('#ftAssets').onclick=()=>{fieldTab='assets';render();};
  const aa=$('#fAddAsset');if(aa)aa.onclick=()=>openAssetWizard();
  $('#fAQ').oninput=e=>{fieldAssetQ=e.target.value;const inp=$('#fAQ');const pos=inp.selectionStart;viewFieldAssets(v,toggle);const ni=$('#fAQ');if(ni){ni.focus();ni.setSelectionRange(pos,pos);}};
  $$('.fMeters',v).forEach(b=>b.onclick=()=>openFieldMeters(b.dataset.c));
  $$('.fEdit',v).forEach(b=>b.onclick=()=>openAssetEdit(b.dataset.c));
}
function openFieldMeters(code){
  const a=assetByCode(code);
  showModal(`<header><h3>${a.name} \u00b7 readings</h3><button class="btn ghost sm" onclick="closeModal()">\u2715</button></header>
   <div class="body">
     <div class="t-sub"><span class="plate">${a.code}</span> ${a.subcategory||''}</div>
     ${(a.meters||[]).length?(a.meters).map((m,i)=>`<label><span class="eyebrow">${m.label}${m.unit?' ('+m.unit+')':''}</span>
        ${m.kind==='expiry'?`<input type="date" class="fm_in" data-i="${i}" value="${m.date?ymd(m.date):''}" style="padding:11px">`:`<input type="number" class="fm_in" data-i="${i}" value="${m.value??''}" placeholder="enter current ${m.label.toLowerCase()}" style="padding:11px">`}</label>`).join(''):'<div class="t-sub">No meters on this asset yet \u2014 add them from Edit details.</div>'}
     <div class="note">Updating an engine-hours or odometer reading powers the \u201chours to go\u201d projection on usage-based services.</div>
   </div>
   <footer><div></div><div style="display:flex;gap:8px"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" id="fm_save" style="padding:11px 18px">Save</button></div></footer>`,true);
  $('#fm_save').onclick=()=>{$$('.fm_in').forEach(inp=>{const m=a.meters[+inp.dataset.i];if(!m)return;if(m.kind==='expiry'){m.date=inp.value?iso(inp.value):null;}else{m.value=inp.value===''?null:+inp.value;}m.updated=iso(TODAY);});Store.save();closeModal();toast('Readings updated');render();};
}

/* ---- toast ---- */
let toastT;function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ---- boot ---- */
window.closeModal=closeModal;
$('#peopleBtn').onclick=()=>openPeople();
$('#reactiveBtn').onclick=()=>openTaskModal();
$('#dataBtn').onclick=()=>openData();
$('#roExit').onclick=()=>{setReadonly(false);render();};
const _mb=$('#menuBtn');if(_mb)_mb.onclick=()=>document.body.classList.toggle('navopen');
const _nb=$('#navback');if(_nb)_nb.onclick=()=>document.body.classList.remove('navopen');
const _nv=$('#nav');if(_nv)_nv.addEventListener('click',e=>{if(e.target.closest('button'))document.body.classList.remove('navopen');});
$('#resetBtn').onclick=async()=>{if(confirm('Reset all data back to the seeded 47 assets? Your changes will be lost.')){await Store.reset();assetDetail=null;route='dashboard';render();toast('Data reset');}};
boot();
</script>
</body>
</html>
